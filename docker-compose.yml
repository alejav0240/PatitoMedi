name: ${COMPOSE_PROJECT_NAME:-patitomedi}

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ${CONTAINER_PREFIX:-patitomedi}-nginx
    depends_on:
      kong:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - edge

  kong:
    image: kong:3.7
    container_name: ${CONTAINER_PREFIX:-patitomedi}-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"
      - "${KONG_ADMIN_PORT:-8001}:8001"
    volumes:
      - ./infra/kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - user-service
      - appointments-service
      - payments-service
      - medical-history-service
      - video-call-service
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - edge
      - backend

  user-service:
    image: hashicorp/http-echo:1.0
    container_name: ${CONTAINER_PREFIX:-patitomedi}-user-service
    command: ["-listen=:8080", "-text={\"service\":\"user\",\"stack\":\"golang\",\"protocol\":\"REST\"}"]
    depends_on:
      users-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend

  appointments-service:
    image: hashicorp/http-echo:1.0
    container_name: ${CONTAINER_PREFIX:-patitomedi}-appointments-service
    command: ["-listen=:8080", "-text={\"service\":\"appointments\",\"stack\":\"spring-boot\",\"protocol\":\"REST\"}"]
    depends_on:
      appointments-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend

  payments-service:
    image: hashicorp/http-echo:1.0
    container_name: ${CONTAINER_PREFIX:-patitomedi}-payments-service
    command: ["-listen=:8080", "-text={\"service\":\"payments\",\"stack\":\"django\",\"protocol\":\"REST\"}"]
    depends_on:
      payments-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend

  medical-history-service:
    image: hashicorp/http-echo:1.0
    container_name: ${CONTAINER_PREFIX:-patitomedi}-medical-history-service
    command: ["-listen=:8080", "-text={\"service\":\"medical-history\",\"stack\":\"express\",\"protocol\":\"GraphQL\"}"]
    depends_on:
      medical-records-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend

  video-call-service:
    image: hashicorp/http-echo:1.0
    container_name: ${CONTAINER_PREFIX:-patitomedi}-video-call-service
    command: ["-listen=:8080", "-text={\"service\":\"video-call\",\"stack\":\"golang\",\"protocol\":\"WebSocket signaling\"}"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      coturn:
        condition: service_started
    networks:
      - backend

  users-db:
    image: postgres:16-alpine
    container_name: ${CONTAINER_PREFIX:-patitomedi}-users-db
    environment:
      POSTGRES_DB: ${USERS_DB_NAME:-users}
      POSTGRES_USER: ${USERS_DB_USER:-users_app}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD:-users_pass}
    ports:
      - "${USERS_DB_PORT:-5433}:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
      - ./infra/postgres/users/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  appointments-db:
    image: postgres:16-alpine
    container_name: ${CONTAINER_PREFIX:-patitomedi}-appointments-db
    environment:
      POSTGRES_DB: ${APPOINTMENTS_DB_NAME:-appointments}
      POSTGRES_USER: ${APPOINTMENTS_DB_USER:-appointments_app}
      POSTGRES_PASSWORD: ${APPOINTMENTS_DB_PASSWORD:-appointments_pass}
    ports:
      - "${APPOINTMENTS_DB_PORT:-5434}:5432"
    volumes:
      - appointments-db-data:/var/lib/postgresql/data
      - ./infra/postgres/appointments/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  payments-db:
    image: postgres:16-alpine
    container_name: ${CONTAINER_PREFIX:-patitomedi}-payments-db
    environment:
      POSTGRES_DB: ${PAYMENTS_DB_NAME:-payments}
      POSTGRES_USER: ${PAYMENTS_DB_USER:-payments_app}
      POSTGRES_PASSWORD: ${PAYMENTS_DB_PASSWORD:-payments_pass}
    ports:
      - "${PAYMENTS_DB_PORT:-5435}:5432"
    volumes:
      - payments-db-data:/var/lib/postgresql/data
      - ./infra/postgres/payments/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  medical-records-db:
    image: mongo:7
    container_name: ${CONTAINER_PREFIX:-patitomedi}-medical-records-db
    environment:
      MONGO_INITDB_DATABASE: ${MEDICAL_RECORDS_DB_NAME:-medical_records}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - medical-records-db-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: ${CONTAINER_PREFIX:-patitomedi}-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - backend

  kafka:
    image: bitnami/kafka:3.7
    container_name: ${CONTAINER_PREFIX:-patitomedi}-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS:-true}
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - backend

  coturn:
    image: coturn/coturn:4.6
    container_name: ${CONTAINER_PREFIX:-patitomedi}-coturn
    command: ["-c", "/etc/coturn/turnserver.conf"]
    ports:
      - "${COTURN_PORT:-3478}:3478/tcp"
      - "${COTURN_PORT:-3478}:3478/udp"
      - "${COTURN_MIN_PORT:-49160}-${COTURN_MAX_PORT:-49200}:49160-49200/udp"
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: ${CONTAINER_PREFIX:-patitomedi}-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "promtool", "check", "config", "/etc/prometheus/prometheus.yml"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    container_name: ${CONTAINER_PREFIX:-patitomedi}-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

networks:
  edge:
  backend:

volumes:
  users-db-data:
  appointments-db-data:
  payments-db-data:
  medical-records-db-data:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
