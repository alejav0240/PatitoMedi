name: patitomedi

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: patitomedi-nginx
    depends_on:
      - kong
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - edge

  kong:
    image: kong:3.7
    container_name: patitomedi-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./infra/kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - user-service
      - appointments-service
      - payments-service
      - medical-history-service
      - video-call-service
    networks:
      - edge
      - backend

  user-service:
    image: hashicorp/http-echo:1.0
    container_name: patitomedi-user-service
    command: ["-listen=:8080", "-text={\"service\":\"user\",\"stack\":\"golang\",\"protocol\":\"REST\"}"]
    depends_on:
      - users-db
      - kafka
    networks:
      - backend

  appointments-service:
    image: hashicorp/http-echo:1.0
    container_name: patitomedi-appointments-service
    command: ["-listen=:8080", "-text={\"service\":\"appointments\",\"stack\":\"spring-boot\",\"protocol\":\"REST\"}"]
    depends_on:
      - appointments-db
      - kafka
    networks:
      - backend

  payments-service:
    image: hashicorp/http-echo:1.0
    container_name: patitomedi-payments-service
    command: ["-listen=:8080", "-text={\"service\":\"payments\",\"stack\":\"django\",\"protocol\":\"REST\"}"]
    depends_on:
      - payments-db
      - kafka
    networks:
      - backend

  medical-history-service:
    image: hashicorp/http-echo:1.0
    container_name: patitomedi-medical-history-service
    command: ["-listen=:8080", "-text={\"service\":\"medical-history\",\"stack\":\"express\",\"protocol\":\"GraphQL\"}"]
    depends_on:
      - medical-records-db
      - kafka
    networks:
      - backend

  video-call-service:
    image: hashicorp/http-echo:1.0
    container_name: patitomedi-video-call-service
    command: ["-listen=:8080", "-text={\"service\":\"video-call\",\"stack\":\"golang\",\"protocol\":\"WebSocket signaling\"}"]
    depends_on:
      - redis
      - kafka
      - coturn
    networks:
      - backend

  users-db:
    image: postgres:16-alpine
    container_name: patitomedi-users-db
    environment:
      POSTGRES_DB: users
      POSTGRES_USER: users_app
      POSTGRES_PASSWORD: users_pass
    ports:
      - "5433:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
      - ./infra/postgres/users/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend

  appointments-db:
    image: postgres:16-alpine
    container_name: patitomedi-appointments-db
    environment:
      POSTGRES_DB: appointments
      POSTGRES_USER: appointments_app
      POSTGRES_PASSWORD: appointments_pass
    ports:
      - "5434:5432"
    volumes:
      - appointments-db-data:/var/lib/postgresql/data
      - ./infra/postgres/appointments/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend

  payments-db:
    image: postgres:16-alpine
    container_name: patitomedi-payments-db
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: payments_app
      POSTGRES_PASSWORD: payments_pass
    ports:
      - "5435:5432"
    volumes:
      - payments-db-data:/var/lib/postgresql/data
      - ./infra/postgres/payments/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend

  medical-records-db:
    image: mongo:7
    container_name: patitomedi-medical-records-db
    environment:
      MONGO_INITDB_DATABASE: medical_records
    ports:
      - "27017:27017"
    volumes:
      - medical-records-db-data:/data/db
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: patitomedi-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend

  kafka:
    image: bitnami/kafka:3.7
    container_name: patitomedi-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - backend

  coturn:
    image: coturn/coturn:4.6
    container_name: patitomedi-coturn
    command: ["-c", "/etc/coturn/turnserver.conf"]
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: patitomedi-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    container_name: patitomedi-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - backend

networks:
  edge:
  backend:

volumes:
  users-db-data:
  appointments-db-data:
  payments-db-data:
  medical-records-db-data:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
