name: ${COMPOSE_PROJECT_NAME:-patitomedi}

services:
# infraestructura - servicios de borde
  nginx:
    image: nginx:1.27-alpine
    container_name: ${CONTAINER_PREFIX:-patitomedi}-nginx
    depends_on:
      kong:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - edge

  kong:
    image: kong:3.7
    container_name: ${CONTAINER_PREFIX:-patitomedi}-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"
      - "${KONG_ADMIN_PORT:-8001}:8001"
    volumes:
      - ./infra/kong/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      - user-service
      #- appointments-service
      #- payments-service
      #- medical-history-service
      #- video-call-service
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - edge
      - backend

  user-service:
    build:
      context: ./services/user
    container_name: ${CONTAINER_PREFIX:-patitomedi}-user-service
    environment:
      PORT: 8080
      DATABASE_URL: postgres://${USERS_DB_USER:-users_app}:${USERS_DB_PASSWORD:-users_pass}@users-db:5432/${USERS_DB_NAME:-users}?sslmode=disable
      JWT_SECRET: ${USER_SERVICE_JWT_SECRET:-dev-user-service-secret-change-me}
      JWT_ISSUER: ${USER_SERVICE_JWT_ISSUER:-patitomedi-user-service}
      JWT_TTL: ${USER_SERVICE_JWT_TTL:-24h}
      KAFKA_BROKERS: kafka:9092
      KAFKA_ENABLED: ${USER_SERVICE_KAFKA_ENABLED:-true}
      KAFKA_USER_TOPIC: ${USER_SERVICE_KAFKA_USER_TOPIC:-user-registered}
    depends_on:
      users-db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    # ports:
    #   - "${USER_SERVICE_PORT:-8080}:8080"
    networks:
      - backend
# microservicios - servicios internos
  appointments-service:
    build:
      context: ./services/appointments
    container_name: ${CONTAINER_PREFIX:-patitomedi}-appointments-service
    environment:
      DATABASE_URL: jdbc:postgresql://appointments-db:5432/${APPOINTMENTS_DB_NAME:-appointments}
      DATABASE_USER: ${APPOINTMENTS_DB_USER:-appointments_app}
      DATABASE_PASSWORD: ${APPOINTMENTS_DB_PASSWORD:-appointments_pass}
      KAFKA_BROKERS: kafka:9092
    depends_on:
      appointments-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - backend

  payments-service:
    build:
      context: ./services/payments
    container_name: ${CONTAINER_PREFIX:-patitomedi}-payments-service
    command: ["sh", "-c", "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8080"]
    environment:
      DJANGO_DEBUG: ${PAYMENTS_SERVICE_DEBUG:-1}
      PAYMENTS_DB_ENGINE: django.db.backends.postgresql
      PAYMENTS_DB_NAME: ${PAYMENTS_DB_NAME:-payments}
      PAYMENTS_DB_USER: ${PAYMENTS_DB_USER:-payments_app}
      PAYMENTS_DB_PASSWORD: ${PAYMENTS_DB_PASSWORD:-payments_pass}
      PAYMENTS_DB_HOST: payments-db
      PAYMENTS_DB_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      KAFKA_ENABLED: ${PAYMENTS_SERVICE_KAFKA_ENABLED:-true}
    depends_on:
      payments-db:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  medical-history-service:
    build:
      context: ./services/medical-history
    container_name: ${CONTAINER_PREFIX:-patitomedi}-medical-history-service
    command: ["sh", "-c", "npm install --production && npm start"]
    environment:
      PORT: 8080
      MONGO_URI: mongodb://medical-records-db:27017/${MEDICAL_RECORDS_DB_NAME:-medical_records}
    depends_on:
      medical-records-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  video-call-service:
    image: hashicorp/http-echo:1.0
    container_name: ${CONTAINER_PREFIX:-patitomedi}-video-call-service
    command: ["-listen=:8080", "-text={\"service\":\"video-call\",\"stack\":\"golang\",\"protocol\":\"WebSocket signaling\"}"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      coturn:
        condition: service_started
    networks:
      - backend

# Databases de datos
  users-db:
    image: postgres:16-alpine
    container_name: ${CONTAINER_PREFIX:-patitomedi}-users-db
    environment:
      POSTGRES_DB: ${USERS_DB_NAME:-users}
      POSTGRES_USER: ${USERS_DB_USER:-users_app}
      POSTGRES_PASSWORD: ${USERS_DB_PASSWORD:-users_pass}
    ports:
      - "${USERS_DB_PORT:-5433}:5432"
    volumes:
      - users-db-data:/var/lib/postgresql/data
      - ./infra/postgres/users/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  appointments-db:
    image: postgres:16-alpine
    container_name: ${CONTAINER_PREFIX:-patitomedi}-appointments-db
    environment:
      POSTGRES_DB: ${APPOINTMENTS_DB_NAME:-appointments}
      POSTGRES_USER: ${APPOINTMENTS_DB_USER:-appointments_app}
      POSTGRES_PASSWORD: ${APPOINTMENTS_DB_PASSWORD:-appointments_pass}
    ports:
      - "${APPOINTMENTS_DB_PORT:-5434}:5432"
    volumes:
      - appointments-db-data:/var/lib/postgresql/data
      - ./infra/postgres/appointments/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  payments-db:
    image: postgres:16-alpine
    container_name: ${CONTAINER_PREFIX:-patitomedi}-payments-db
    environment:
      POSTGRES_DB: ${PAYMENTS_DB_NAME:-payments}
      POSTGRES_USER: ${PAYMENTS_DB_USER:-payments_app}
      POSTGRES_PASSWORD: ${PAYMENTS_DB_PASSWORD:-payments_pass}
    ports:
      - "${PAYMENTS_DB_PORT:-5435}:5432"
    volumes:
      - payments-db-data:/var/lib/postgresql/data
      - ./infra/postgres/payments/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  medical-records-db:
    image: mongo:7
    container_name: ${CONTAINER_PREFIX:-patitomedi}-medical-records-db
    environment:
      MONGO_INITDB_DATABASE: ${MEDICAL_RECORDS_DB_NAME:-medical_records}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - medical-records-db-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: ${CONTAINER_PREFIX:-patitomedi}-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - backend

# comunicación entre servicios
  kafka:
    image: apache/kafka:3.7.0
    container_name: ${CONTAINER_PREFIX:-patitomedi}-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS:-true}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - backend

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: ${CONTAINER_PREFIX:-patitomedi}-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic user-registered --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic user-updated --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic session-created --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic session-ended --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic appointment-created --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic appointment-cancelled --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic invoice-created --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-confirmed --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment-failed --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic refund-created --partitions 3 --replication-factor 1
    networks:
      - backend

  coturn:
    image: coturn/coturn:4.6
    container_name: ${CONTAINER_PREFIX:-patitomedi}-coturn
    command: ["-c", "/etc/coturn/turnserver.conf"]
    ports:
      - "${COTURN_PORT:-3478}:3478/tcp"
      - "${COTURN_PORT:-3478}:3478/udp"
      - "${COTURN_MIN_PORT:-49160}-${COTURN_MAX_PORT:-49200}:49160-49200/udp"
    volumes:
      - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - backend

  # Herramientas de monitoreo
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: ${CONTAINER_PREFIX:-patitomedi}-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "promtool", "check", "config", "/etc/prometheus/prometheus.yml"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    container_name: ${CONTAINER_PREFIX:-patitomedi}-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

networks:
  edge:
  backend:

volumes:
  users-db-data:
  appointments-db-data:
  payments-db-data:
  medical-records-db-data:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
